spring:
  application:
    name: backend

  # --- Database Configuration ---
  # Shared defaults for team development.
  # Keep secrets out of Git and provide them via environment variables
  # or an ignored application-local.yaml with the "local" profile enabled.
  datasource:
    # The agreed local database name is scooter_db.
    # Override with SPRING_DATASOURCE_URL when a teammate uses another host or port.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/scooter_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    # Do not commit real credentials here.
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
    hibernate:
      # Use update for local development. Prefer validate in production.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}
      path: /h2-console
