spring:
  application:
    name: backend

  # --- Database Configuration ---
  # Best Practice: Use environment variables (${VAR:DEFAULT}) for Prod/Dev separation
  datasource:
    # 1. URL: Defaults to H2. Prod environment overrides SPRING_DATASOURCE_URL
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:scooter_db;DB_CLOSE_DELAY=-1}
    # For Local MySQL, uncomment line below (and comment out H2):
    # url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/scooter_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

    # 2. Driver
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    # driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

    # 3. Credentials
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    # username: ${SPRING_DATASOURCE_USERNAME:root}
    # password: ${SPRING_DATASOURCE_PASSWORD:your_password}

  jpa:
    # Dialect: H2 vs MySQL8Dialect
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      # DDL: 'update' for dev, 'validate' for prod
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}
      path: /h2-console
